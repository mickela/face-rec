{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto">
    <div class="text-center mb-10">
        <h1 class="text-2xl font-bold text-white mb-2">Welcome back</h1>
        <p class="text-zinc-500 text-sm">Sign in to your FaceRec account</p>
    </div>

    <div class="p-6 sm:p-8 rounded-xl border border-zinc-800/80 bg-zinc-900/30">
        <form method="post" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium text-zinc-400 mb-2">Email</label>
                <input type="email" name="email" id="email" required
                    class="w-full px-4 py-3 rounded-lg bg-zinc-800/80 border border-zinc-700 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 transition-all"
                    placeholder="you@example.com">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-zinc-400 mb-2">Password</label>
                <input type="password" name="password" id="password" required
                    class="w-full px-4 py-3 rounded-lg bg-zinc-800/80 border border-zinc-700 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 transition-all"
                    placeholder="••••••••">
            </div>
            <button type="submit"
                class="w-full py-3 px-4 bg-emerald-500 text-zinc-950 font-semibold rounded-lg hover:bg-emerald-400 transition-all hover:scale-[1.01] active:scale-[0.99]">
                Sign In
            </button>
        </form>
        <p class="mt-6 text-center text-sm text-zinc-500">
            Don't have an account?
            <a href="{{ url_for('signup') }}" class="text-emerald-400 hover:text-emerald-300 font-medium transition-colors">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
