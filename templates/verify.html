{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto">
    <div class="text-center mb-10">
        <h1 class="text-2xl font-bold text-white mb-2">Verify your identity</h1>
        <p class="text-zinc-500 text-sm">Upload a photo to confirm it's you</p>
    </div>

    <div class="p-6 sm:p-8 rounded-xl border border-zinc-800/80 bg-zinc-900/30">
        <form method="post" enctype="multipart/form-data" class="space-y-6">
            <div>
                <label for="verification_image" class="block text-sm font-medium text-zinc-400 mb-2">Verification Photo</label>
                <input type="file" name="verification_image" id="verification_image" accept="image/*" required
                    class="w-full px-4 py-3 rounded-lg bg-zinc-800/80 border border-zinc-700 text-zinc-300 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-emerald-500/20 file:text-emerald-400 file:font-medium file:cursor-pointer hover:file:bg-emerald-500/30 transition-all focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50">
                <p class="mt-1.5 text-xs text-zinc-500">Take a clear selfie. We'll match it to your profile.</p>
            </div>
            <button type="submit"
                class="w-full py-3 px-4 bg-emerald-500 text-zinc-950 font-semibold rounded-lg hover:bg-emerald-400 transition-all hover:scale-[1.01] active:scale-[0.99]">
                Verify
            </button>
        </form>
        <p class="mt-6 text-center">
            <a href="{{ url_for('dashboard') }}" class="text-sm text-zinc-500 hover:text-zinc-400 transition-colors">
                ← Back to Dashboard
            </a>
        </p>
    </div>
</div>
{% endblock %}
