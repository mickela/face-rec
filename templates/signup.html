{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto">
    <div class="text-center mb-10">
        <h1 class="text-2xl font-bold text-white mb-2">Create account</h1>
        <p class="text-zinc-500 text-sm">Register with your face for secure verification</p>
    </div>

    <div class="p-6 sm:p-8 rounded-xl border border-zinc-800/80 bg-zinc-900/30">
        <form method="post" enctype="multipart/form-data" class="space-y-5">
            <div>
                <label for="full_name" class="block text-sm font-medium text-zinc-400 mb-2">Full Name</label>
                <input type="text" name="full_name" id="full_name" required
                    class="w-full px-4 py-3 rounded-lg bg-zinc-800/80 border border-zinc-700 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 transition-all"
                    placeholder="John Doe">
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-zinc-400 mb-2">Email</label>
                <input type="email" name="email" id="email" required
                    class="w-full px-4 py-3 rounded-lg bg-zinc-800/80 border border-zinc-700 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 transition-all"
                    placeholder="you@example.com">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-zinc-400 mb-2">Password</label>
                <input type="password" name="password" id="password" required
                    class="w-full px-4 py-3 rounded-lg bg-zinc-800/80 border border-zinc-700 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 transition-all"
                    placeholder="••••••••">
            </div>
            <div>
                <label for="department" class="block text-sm font-medium text-zinc-400 mb-2">Department</label>
                <input type="text" name="department" id="department" required
                    class="w-full px-4 py-3 rounded-lg bg-zinc-800/80 border border-zinc-700 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 transition-all"
                    placeholder="Engineering">
            </div>
            <div>
                <label for="profile_img" class="block text-sm font-medium text-zinc-400 mb-2">Profile Photo</label>
                <input type="file" name="profile_img" id="profile_img" accept="image/*" required
                    class="w-full px-4 py-3 rounded-lg bg-zinc-800/80 border border-zinc-700 text-zinc-300 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-emerald-500/20 file:text-emerald-400 file:font-medium file:cursor-pointer hover:file:bg-emerald-500/30 transition-all focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50">
                <p class="mt-1.5 text-xs text-zinc-500">Used for facial verification. Clear face photo required.</p>
            </div>
            <button type="submit"
                class="w-full py-3 px-4 bg-emerald-500 text-zinc-950 font-semibold rounded-lg hover:bg-emerald-400 transition-all hover:scale-[1.01] active:scale-[0.99]">
                Create Account
            </button>
        </form>
        <p class="mt-6 text-center text-sm text-zinc-500">
            Already have an account?
            <a href="{{ url_for('login') }}" class="text-emerald-400 hover:text-emerald-300 font-medium transition-colors">Login</a>
        </p>
    </div>
</div>
{% endblock %}
